---
# ==========================================
# 🟢 10 TAREAS BÁSICAS (PROXMOX)
# ==========================================
- name: "B1: PVE - Obtener versión de Proxmox"
  ansible.builtin.command: pveversion
  register: pve_ver
  changed_when: false

- name: "B2: PVE - Verificar salud del Clúster"
  ansible.builtin.command: pvecm status
  ignore_errors: true
  changed_when: false

- name: "B3: PVE - Listar almacenamiento (Storage)"
  ansible.builtin.command: pvesm status
  changed_when: false

- name: "B4: PVE - Actualizar paquetes del host Proxmox"
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist

- name: "B5: PVE - Verificar uso de CPU y RAM (pvestatd)"
  ansible.builtin.service:
    name: pvestatd
    state: started

- name: "B6: PVE - Sincronizar NTP"
  ansible.builtin.service:
    name: chronyd
    state: started
  ignore_errors: true

- name: "B7: PVE - Instalar htop para monitorización"
  ansible.builtin.apt:
    name: htop
    state: present

- name: "B8: PVE - Chequeo de red (ping gateway)"
  ansible.builtin.command: ping -c 2 192.168.1.1
  changed_when: false

- name: "B9: PVE - Listar VMs activas en nodo local"
  ansible.builtin.command: qm list
  changed_when: false

- name: "B10: PVE - Limpiar logs de PVE"
  ansible.builtin.command: journalctl --vacuum-time=7d

